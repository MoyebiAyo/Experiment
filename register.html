<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for Kansy Couture client portal.">
  <title>Register — Kansy Couture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="register">
  <header class="main-header">
    <div class="main-header__inner">
      <a href="index.html" class="logo"><span class="logo__title">Kansy Couture</span><span class="logo__tagline">Bespoke Fashion Design</span></a>
    </div>
  </header>

  <main>
    <section class="page-hero" style="padding:48px 0;">
      <div class="container">
        <h1 class="page-hero__title">Create Account</h1>
        <p class="page-hero__subtitle">Join Kansy Couture to book appointments and chat with your designer</p>
      </div>
    </section>

    <section class="section">
      <form class="form-panel" id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" name="confirm" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn--primary" style="width:100%;">Register</button>
        <p class="form-message" id="register-message" role="status" aria-live="polite"></p>
        <p class="form-footer">Already registered? <a href="login.html">Sign in</a></p>
      </form>
    </section>
  </main>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
